<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Snapshot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f11;
      --card-bg: rgba(28, 28, 30, 0.8);
      --text-main: #f5f5f7;
      --text-muted: #a1a1a6;
      --accent: #0a84ff;
      --accent-hover: #0071e3;
      --input-bg: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
    }
    
    body {
      margin: 0;
      padding: 0;
      width: 320px;
      background-color: var(--bg);
      background-image: radial-gradient(circle at top right, rgba(10, 132, 255, 0.15), transparent 60%),
                        radial-gradient(circle at bottom left, rgba(255, 59, 48, 0.1), transparent 60%);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
    }

    .container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, #fff, #a1a1a6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    .btn-main {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.15);
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.3px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-main:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .btn-main svg {
      margin-right: 8px;
    }

    .section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .section h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 10px 0;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-size: 13px;
      color: var(--text-main);
    }

    .input-group input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 12px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text-main);
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .status-msg {
      font-size: 11px;
      color: #34c759;
      height: 12px;
      text-align: right;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .social-link {
      color: var(--text-muted);
      transition: color 0.2s ease, transform 0.2s ease;
      display: flex;
    }
    
    .social-link:hover {
      color: var(--text-main);
      transform: scale(1.1);
    }
    
    .social-link svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .support-compact {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }

    .creator {
      font-size: 12px;
      color: var(--text-muted);
    }

    .creator-link {
      color: var(--text-main);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .creator-link:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .btn-donate {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      background: rgba(10, 132, 255, 0.15);
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      font-size: 12px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .btn-donate:hover {
      background: rgba(10, 132, 255, 0.25);
    }

    .btn-donate svg {
      width: 14px;
      height: 14px;
      margin-right: 4px;
    }

    .footer-text {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>YouTube Snapshot</h1>

    <button id="take-snapshot-btn" class="btn-main">
      <svg height="20" viewBox="0 0 24 24" width="20" fill="currentColor">
        <path d="M20 5h-3.17L15 3H9L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 14H4V7h4.05l1.83-2h4.24l1.83 2H20v12zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.65 0-3 1.35-3 3s1.35 3 3 3 3-1.35 3-3-1.35-3-3-3z"></path>
      </svg>
      Take Snapshot
    </button>

    <div class="section">
      <h2>Settings</h2>
      <div class="input-group">
        <label for="download-folder">Download Folder (optional)</label>
        <input type="text" id="download-folder" placeholder="e.g. YouTube Snapshots">
      </div>
      <div class="input-group" style="margin-top: 10px; flex-direction: row; align-items: center; gap: 8px;">
        <input type="checkbox" id="ask-before-saving" style="width: auto;">
        <label for="ask-before-saving" style="cursor: pointer;">Ask where to save before downloading</label>
      </div>
      <div id="save-status" class="status-msg">Saved</div>
    </div>

    <div class="support-compact">
      <div class="creator">
        Created by <a href="https://zainyousef.app/" target="_blank" class="creator-link" title="Portfolio">Zain Yousef</a>
      </div>
      <a href="https://paypal.me/poqozi" target="_blank" class="btn-donate">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        Donate
      </a>
    </div>
    
    <div class="footer-text">
      Shortcut: Press 'S' on YouTube<br>
      <a href="https://gist.github.com/ZainYoussef/d452c85ed1ffc82bccb4a872130832ff" target="_blank" style="color: var(--text-muted); text-decoration: underline; margin-top: 6px; display: inline-block; transition: color 0.2s;">Privacy Policy</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
